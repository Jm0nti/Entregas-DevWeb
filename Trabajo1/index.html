<!DOCTYPE html>
<html lang="es">
<!-- Formulario: Licorera La Cancha V_01 -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Juan Luis Montiel Villalba, Juan Manuel Rodríguez Sánchez">
    <meta name="description" content="Licorera La Cancha, la mejor excusa para compartir con tus amigos">
    <link rel="icon" type="image/svg+xml" href="https://www.svgrepo.com/show/137442/soccer-field.svg">
    <title>Licorera La Cancha</title>
</head>

<body>

    <h2>LICORERA LA CANCHA</h2>

    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <!-- Debe incluir un enlace a una segunda página web que muestre un about -->
            <li><a href="about.html">Acerca de</a></li>
        </ul>
    </nav>

    <form id="formulario_n01" name="formularioN01" action="validacion_form.js">

        <h3>CLIENTE</h3>

        <p>
            <label for="cliente_nombre">1. Nombre:</label>
            <input type="text" id="cliente_nombre" name="ClienteNombre" placeholder="Escriba acá su nombre completo" 
                size="25" required="on" autocomplete="on" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ ]{3,}">
        </p>

        <p>
            <label for="cliente_cedula">2. Cédula:</label>
            <input type="number" id="cliente_cedula" name="ClienteCedula" placeholder="Escriba acá su cédula"
                required="on" autocomplete="on" pattern="\d{8,11}">
        </p>

        <p>
            <label for="cliente_telefono">3. Teléfono:</label>
            <input type="number" id="cliente_telefono" name="ClienteTelefono"
                placeholder="Ej. 3001234567" size="15" required="on" autocomplete="on" pattern="\d{10}">
        </p>

        <p>
            <label for="cliente_email">4. Email:</label>
            <input type="email" id="cliente_email" name="ClienteEmail"
                placeholder="Ej. nombre@correo.com" size="25" required="on" autocomplete="on">
        </p>

        <p>
            <label for="cliente_login">5. Login (contraseña):</label>
            <input type="password" id="cliente_login" name="ClienteLogin" title="Mínimo 8 caracteres, incluyendo al menos una letra mayúscula, una letra minúscula y un número" 
                placeholder="Mínimo 8 caracteres" size="20" required="on" autocomplete="on" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}">
        </p>

        <p>
            <label for="cliente_edad">6. Edad:</label>
            <input type="number" id="cliente_edad" name="ClienteEdad" placeholder="Ej. 25" min="18" max="99"
                size="7" required="on" autocomplete="on">
        </p>

        <p>
            <label for="cliente_direccion">7. Dirección:</label>
            <textarea id="cliente_direccion" name="ClienteDireccion" placeholder="Ej. Calle 50F #21-99" 
            cols="25" rows="2" required="on" autocomplete="on"></textarea>
        </p>

        <h3>PEDIDO</h3>

        <p>
            <label for="pedido_nombre">8. Nombre:</label>
            <input type="text" id="pedido_nombre" name="PedidoNombre"
                placeholder="Ej. Vino, Aguardiente..." size="20" required="on" autocomplete="on">
        </p>

        <p>
            <label for="pedido_id">9. ID:</label>
            <input type="number" id="pedido_id" name="PedidoId" placeholder="Ej. 17" 
            min="1" max="100" required="on" autocomplete="on">
        </p>

        <p>
            <label for="pedido_volumen_alcohol">10. Volumen de Alcohol:</label>
            <input type="number" id="pedido_volumen_alcohol" name="PedidoVolumenAlcohol" placeholder="Ej. 29"
                min="0" max="100" size="5" required="on" autocomplete="on">
        </p>

        <p>
            <label for="pedido_precio">11. Precio:</label>
            <input type="number" id="pedido_precio" name="PedidoPrecio" placeholder="Ej. 45000"
                min="1000" max="500000" required="on" autocomplete="on">
        </p>

        <p>
            <label>12. Tamaño:</label><br>
            <input type="radio" id="pedido_tamano_350" name="PedidoTamano" value="350ml">
            <label for="pedido_tamano_350">350ml</label>
            <input type="radio" id="pedido_tamano_500" name="PedidoTamano" value="500ml">
            <label for="pedido_tamano_500">500ml</label>
            <input type="radio" id="pedido_tamano_700" name="PedidoTamano" value="700ml">
            <label for="pedido_tamano_700">700ml</label>
            <input type="radio" id="pedido_tamano_1000" name="PedidoTamano" value="1000ml">
            <label for="pedido_tamano_1000">1000ml</label>
        </p>

        <p>
            <label for="pedido_marca">13. Marca:</label>
            <input type="text" id="pedido_marca" name="PedidoMarca" placeholder="Seleccione o escriba una marca"
                size="27" autocomplete="off" list="lista_marcas">
            <datalist id="lista_marcas">
                <option value="Gato Negro">Gato Negro</option>
                <option value="Concha y Toro">Concha y Toro</option>
                <option value="Santa Helena">Santa Helena</option>
                <option value="Casillero del Diablo">Casillero del Diablo</option>
            </datalist>
        </p>

        <p>
            <button type="submit">Enviar formulario</button>
            <button type="reset">Reiniciar formulario</button>
        </p>

    </form>

    <script src="validacion_form.js"></script>

</body>

</html>
